services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: shep-ai-db
    environment:
      POSTGRES_USER: shep
      POSTGRES_PASSWORD: shep_local
      POSTGRES_DB: shep_ai
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: shep-ai-redis
    ports:
      - "6379:6379"

  ollama:
    image: ollama/ollama:latest
    container_name: shep-ai-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  pgdata:
  ollama_data:
